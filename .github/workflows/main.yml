name: Android CI

on:
  push:
    branches: [ main, develop ]  # Выполнение при пушах в ветки main и develop
  pull_request:
    branches: [ main, develop ]  # Выполнение при создании PR в указанные ветки

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'adopt'

    - name: Grant execute permission for gradlew
      run: chmod +x ./gradlew

    - name: Build with Gradle
      run: ./gradlew build

    - name: Run tests
      run: ./gradlew test

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4  # Используется актуальная версия upload-artifact
      with:
        name: apk
        path: app/build/outputs/apk/release/*.apk
